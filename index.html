<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background-color: white;
            width: 550px;
            display: flex;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .sidebar {
            background-color: #0d3b4c;
            width: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
        }
        .content {
            padding: 40px;
            flex: 1;
        }
        h1 {
            margin: 0;
            color: #0d3b4c;
            font-size: 26px;
            border-left: 5px solid #0d3b4c;
            padding-left: 15px;
        }
        .label {
            margin-top: 20px;
            font-size: 11px;
            text-transform: uppercase;
            color: #1a73e8;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .info {
            font-size: 15px;
            color: #333;
            margin-bottom: 5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="sidebar">
        <img src="profile.jpg" alt="Arian Joy" class="profile-pic">
    </div>
    <div class="content">
        <h1>Arian Joy Joaquin</h1>
        
        <div class="label">Address</div>
        <div class="info">Diplahan, Zamboanga Sibugay</div>
        
        <div class="label">Course</div>
        <div class="info">BS in Information Technology (BSIT)</div>
        
        <div class="label">Specialization</div>
        <div class="info">Computer Vision & C++ Programming</div>
    </div>
</div>

</body>
</html>
