<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background-color: white;
            width: 500px;
            display: flex;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .sidebar {
            background-color: #1a4a5e;
            width: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }
        .content {
            padding: 30px;
            flex: 1;
        }
        h1 {
            margin: 0;
            color: #1a4a5e;
            font-size: 24px;
            border-left: 4px solid #1a4a5e;
            padding-left: 10px;
        }
        .info-row {
            margin-top: 15px;
            font-size: 13px;
            text-transform: uppercase;
            color: #777;
            font-weight: bold;
        }
        .info-data {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="sidebar">
        <img src="profile.jpg" alt="Arian" class="profile-pic">
    </div>
    <div class="content">
        <h1>Arian Joy Joaquin</h1>
        
        <div class="info-row">Address</div>
        <div class="info-data">Diplahan, Zamboanga Sibugay</div>
        
        <div class="info-row">Course</div>
        <div class="info-data">Bachelor of Science in Information Technology</div>
        
        <div class="info-row">Specialization</div>
        <div class="info-data">Computer Vision & C++ Programming</div>
    </div>
</div>

</body>
</html>
